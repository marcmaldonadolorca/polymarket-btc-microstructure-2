# Política congelada del especialista prestart H60 (candidato final).
# Estos valores NO se retocan: se fijaron antes de ver los datos fresh (6-10 jun).
# Ver docs/14_especialista_prestart_h60.md, docs/15_vol_gate.md, docs/16_validacion_fresh.md.

specialist:
  horizon_seconds: 60                 # H60: único horizonte que conserva señal en OOF
  feature_set: no_clock               # 36 features, sin variables de reloj
  prestart_filter: strict_45_60_early # ventana 45-60 s antes de la apertura
  model: HistGradientBoosting         # regresor EV + clasificador healthy

policy:
  ev_pred_min: 0.75      # ev_pred > 0.75   (regresor de expected value)
  hp_pred_min: 0.50      # hp_pred >= 0.50  (clasificador de sesión "healthy")

vol_gate:
  feature: perp_realized_vol_bps_5s
  max: 0.6657            # q80 del training; crítico porque el régimen fresh cambió (22% -> 52-71% HIGH_VOL)

cost_model:
  reference_cost_ticks: 0.5   # coste conservador de referencia
  secondary_cost_ticks: 0.25  # coste optimista de contraste
  latency_contract_seconds: 2 # contrato conservador (malla del dataset); p95 medido ~0.43 s

decision_gates:
  PAPER_SHADOW_CANDIDATE: "net@0.5 > 0.50 AND n_trades >= 200 AND n_days >= 8"
  PROMISING_NEEDS_DATA:   "net@0.5 > 0.00 AND n_trades < 200"
  REVIEW_POLICY:          "net@0.5 <= 0.00 AND n_days >= 3"
